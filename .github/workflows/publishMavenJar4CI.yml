# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: deploy CI jar to OSS

on:
  push:
    tags:
      - 'v*'

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 1.8
        uses: actions/setup-java@v1
        with:
          java-version: 1.8
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Gradle Build
        working-directory: src/backend
        env:
          MAVEN_REPO_DEPLOY_URL: "https://ossrh-staging-api.central.sonatype.com/service/local/"
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          signingKey: ${{ secrets.SIGNING_KEY }}
          signingKeyId: ${{ secrets.SIGNING_KEY_ID }}
          signingPassword: ${{ secrets.SIGNING_PASSWORD }}        
        run: |
          echo "GITHUB_REF=${GITHUB_REF}"
          repo_version=${GITHUB_REF##*/v}
          echo "repo_version=${repo_version}"
          export signingKey=${signingKey}
          ./gradlew publishJarPublicationToAllJarRepository -Drepo_version=${repo_version} -PallJarRepo=${MAVEN_REPO_DEPLOY_URL} -PallJarUsername=${SONATYPE_USERNAME} -PallJarPassword=${SONATYPE_PASSWORD} -PsigningKeyId=${signingKeyId} -PsigningPassword='${signingPassword}' --stacktrace